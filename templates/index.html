<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional AI Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background: #071126; color: #ffffff; overflow: hidden; }
        
        /* Sidebar Layout */
        .sidebar { width: 280px; background: #0b1a3a; padding: 25px 20px; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid #142a56; overflow-y: auto; }
        .logo-section h1 { font-size: 24px; color: #38b6ff; display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
        .features-list { list-style: none; display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .features-list li { font-size: 14px; color: #cbd5e1; display: flex; align-items: center; gap: 10px; }
        .features-list li::before { content: "✓"; color: #38b6ff; font-weight: bold; }
        
        /* Contact Us Form UI Styling */
        .contact-box { background: #132244; border: 1px solid #1e3360; padding: 15px; border-radius: 10px; margin-bottom: 25px; }
        .contact-box h3 { font-size: 16px; color: #38b6ff; margin-bottom: 12px; }
        .contact-input { width: 100%; padding: 8px 12px; background: #071126; border: 1px solid #1e3360; border-radius: 6px; color: white; font-size: 13px; margin-bottom: 10px; outline: none; }
        .contact-input:focus { border-color: #38b6ff; }
        .contact-textarea { width: 100%; height: 60px; padding: 8px 12px; background: #071126; border: 1px solid #1e3360; border-radius: 6px; color: white; font-size: 13px; margin-bottom: 10px; resize: none; outline: none; }
        .contact-textarea:focus { border-color: #38b6ff; }
        .btn-submit-contact { width: 100%; background: #38b6ff; color: #071126; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }
        
        /* Sidebar Action Buttons */
        .sidebar-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .btn-secondary { background: #1e3360; color: #ffffff; border: 1px solid #2da1e6; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; text-align: center; width: fit-content; padding: 6px 12px; }
        .btn-clear { background: #2da1e6; color: #071126; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; text-align: center; }
        .btn-clear:hover, .btn-submit-contact:hover { opacity: 0.9; }
        .footer-credit { font-size: 11px; color: #64748b; }

        /* Main Chat Panel Container */
        .main-chat { flex: 1; display: flex; flex-direction: column; padding: 40px; position: relative; }
        .chat-header { font-size: 36px; font-weight: bold; margin-bottom: 30px; color: #ffffff; }
        
        /* Message Area Feed */
        .messages-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; margin-bottom: 100px; padding-right: 10px; }
        .msg-bubble { max-width: 75%; padding: 12px 20px; border-radius: 12px; font-size: 15px; line-height: 1.5; width: fit-content; animation: fadeIn 0.3s ease-in-out; }
        .msg-bot { background: #182849; color: #ffffff; border-top-left-radius: 2px; align-self: flex-start; }
        .msg-user { background: #38b6ff; color: #071126; border-top-right-radius: 2px; align-self: flex-end; font-weight: 500; }

        /* Input Control Strip */
        .input-container { position: absolute; bottom: 40px; left: 40px; right: 40px; display: flex; gap: 15px; }
        .input-field { flex: 1; background: #132244; border: 1px solid #1e3360; border-radius: 12px; padding: 16px 24px; color: #ffffff; font-size: 15px; outline: none; }
        .input-field::placeholder { color: #4b5e85; }
        .input-field:focus { border-color: #38b6ff; }
        .btn-send { background: #38b6ff; color: #071126; border: none; border-radius: 12px; padding: 0 30px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 14px rgba(56, 182, 255, 0.3); }
        
        /* Custom Scrollbar */
        .sidebar::-webkit-scrollbar, .messages-container::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb, .messages-container::-webkit-scrollbar-thumb { background: #1e3360; border-radius: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="top-group">
            <div class="logo-section">
                <h1>🤖 AI Chatbot</h1>
            </div>
            <ul class="features-list">
                <li>Smart Responses</li>
                <li>Voice Assistant</li>
                <li>Typing Animation</li>
                <li>Modern UI</li>
                <li>Responsive Design</li>
            </ul>

            <div class="contact-box">
                <h3>Contact Us</h3>
                <input type="email" id="contactEmail" class="contact-input" placeholder="Your Email" required>
                <textarea id="contactMsg" class="contact-textarea" placeholder="Your Message..." required></textarea>
                <button class="btn-submit-contact" onclick="submitContactForm()">Send Message</button>
            </div>
        </div>
        
        <div class="bottom-group">
            <div class="sidebar-buttons">
                <button class="btn-secondary" onclick="alert('C++ Rule-Based Chatbot Frame\nDeveloper: Krish Goel')">About Page</button>
                <button class="btn-clear" onclick="clearChat()">Clear Chat</button>
            </div>
            <div class="footer-credit">Created by Krish Goel 🚀</div>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">Professional AI Chatbot</div>
        
        <div class="messages-container" id="chatFeed">
            <div class="msg-bubble msg-bot">Hello 👋 Welcome to AI Chatbot</div>
        </div>

        <div class="input-container">
            <input type="text" id="userQuery" class="input-field" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') executeMessageSend()">
            <button class="btn-send" onclick="executeMessageSend()">Send</button>
        </div>
    </div>

    <script>
        function executeMessageSend() {
            const inputElement = document.getElementById("userQuery");
            const queryText = inputElement.value.trim();
            if (!queryText) return;

            const chatFeed = document.getElementById("chatFeed");

            const userBubble = document.createElement("div");
            userBubble.className = "msg-bubble msg-user";
            userBubble.innerText = queryText;
            chatFeed.appendChild(userBubble);

            inputElement.value = "";
            chatFeed.scrollTop = chatFeed.scrollHeight;

            fetch('/chat?msg=' + encodeURIComponent(queryText))
                .then(response => response.text())
                .then(responseText => {
                    const botBubble = document.createElement("div");
                    botBubble.className = "msg-bubble msg-bot";
                    botBubble.innerText = responseText;
                    chatFeed.appendChild(botBubble);
                    chatFeed.scrollTop = chatFeed.scrollHeight;
                });
        }

        // Script to Process Contact Form Submission
        function submitContactForm() {
            const email = document.getElementById("contactEmail").value.trim();
            const message = document.getElementById("contactMsg").value.trim();

            if (!email || !message) {
                alert("Please fill in both fields before sending.");
                return;
            }

            // Route the request parameters directly to our new C++ backend handler
            fetch(`/contact?email=${encodeURIComponent(email)}&message=${encodeURIComponent(message)}`)
                .then(response => response.text())
                .then(alertMessage => {
                    alert(alertMessage);
                    // Clear inputs upon success
                    document.getElementById("contactEmail").value = "";
                    document.getElementById("contactMsg").value = "";
                })
                .catch(err => {
                    alert("Error reaching the backend tracking engine.");
                });
        }

        function clearChat() {
            document.getElementById("chatFeed").innerHTML = '<div class="msg-bubble msg-bot">Hello 👋 Welcome to AI Chatbot</div>';
        }
    </script>
</body>
</html>
