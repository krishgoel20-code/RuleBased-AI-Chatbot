<!DOCTYPE html>
<html>
<head>
    <title>Krish's Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; padding: 50px; text-align: center; }
        .chat-box { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #response { margin-top: 20px; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chat-box">
        <h2>C++ Rule-Based AI Chatbot</h2>
        <input type="text" id="userInput" placeholder="Ask me something...">
        <button onclick="sendMessage()">Send</button>
        <div id="response"></div>
    </div>

    <script>
        function sendMessage() {
            let msg = document.getElementById("userInput").value;
            fetch('/chat?msg=' + encodeURIComponent(msg))
                .then(res => res.text())
                .then(data => { document.getElementById("response").innerText = data; });
        }
    </script>
</body>
</html>
